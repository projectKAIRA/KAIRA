      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="wingUR" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="wingLL" x1="1" y1="0" x2="0" y2="1">
